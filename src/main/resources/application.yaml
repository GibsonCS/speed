spring:
  application:
    name: speed
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb
    username: sa
    password: sa
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    #Espera o hibernate criar banco antes de rodar o data.sql
    defer-datasource-initialization: true